<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applications - Clover Kingdom</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
            <h3>Clover Kingdom</h3>
        </div>
        <ul class="sidebar-links">
            <li><a href="applications.html" class="active">Applications</a></li>
            <li><a href="announcements.html">Announcements</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="appeals.html">Appeals</a></li>
            <li><a href="staff.html">Staff</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="login.html" id="auth-link" class="btn-signin">Sign In</a>
        </div>
    </nav>

    <!-- Toggle Button -->
    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Main Content -->
    <main class="main-content expanded" id="mainContent">
        <section class="page-header fade-up">
            <div class="container">
                <h1>📋 Applications</h1>
                <p>Apply for positions within the Clover Kingdom</p>
            </div>
        </section>

        <section class="page-section">
            <div class="container">
                <div class="form-container fade-up">
                    <form class="appeal-form" id="applicationForm">
                        <div class="form-group">
                            <label>Your Name</label>
                            <input type="text" id="appName" placeholder="Enter your name" required>
                        </div>
                        <div class="form-group">
                            <label>Discord Username</label>
                            <input type="text" id="appDiscord" placeholder="e.g. Suki#1234" required>
                        </div>
                        <div class="form-group">
                            <label>Position Applying For</label>
                            <select id="appType" required>
                                <option value="">Select a position...</option>
                                <option value="Magic Knight">Magic Knight</option>
                                <option value="Staff">Staff</option>
                                <option value="Squad Member">Squad Member</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Why do you want to join?</label>
                            <textarea id="appReason" rows="4" placeholder="Tell us why you want to join..." required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Previous Experience</label>
                            <textarea id="appExperience" rows="3" placeholder="Any relevant experience..."></textarea>
                        </div>
                        <button type="submit" class="btn-submit">Submit Application</button>
                    </form>
                </div>

                <div style="text-align:center;margin-top:3rem;">
                    <a href="index.html" style="color:var(--gold);text-decoration:none;">← Back to Home</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer expanded" id="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-title">Clover Kingdom</div>
                <a href="https://discord.gg/7tUgatHjtg" target="_blank" class="discord-link">Join our Discord</a>
                <div class="footer-credit">Made & Managed by Suki</div>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        // Application form handler
        const appForm = document.getElementById('applicationForm');
        if (appForm) {
            appForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const apps = JSON.parse(localStorage.getItem('ck_applications') || '[]');
                apps.push({
                    id: Date.now(),
                    name: document.getElementById('appName').value,
                    discord: document.getElementById('appDiscord').value,
                    type: document.getElementById('appType').value,
                    reason: document.getElementById('appReason').value,
                    experience: document.getElementById('appExperience').value || 'None provided',
                    date: new Date().toLocaleDateString(),
                    status: 'pending'
                });
                
                localStorage.setItem('ck_applications', JSON.stringify(apps));
                alert('Application submitted successfully! Our staff will review it soon.');
                appForm.reset();
            });
        }
    </script>
</body>
</html>
