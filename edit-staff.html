<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Staff - Clover Kingdom</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
            <h3>Clover Kingdom</h3>
            <div class="sidebar-rank" id="sidebarRank">Rank</div>
        </div>
        <ul class="sidebar-links admin-links" id="adminLinks"></ul>
        <div class="sidebar-footer">
            <a href="dashboard.html" class="btn-signin">← Dashboard</a>
            <a href="#" id="logoutBtn" class="btn-signin" style="margin-top:0.5rem;">Sign Out</a>
        </div>
    </nav>

    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <main class="main-content expanded" id="mainContent">
        <section class="page-header fade-up">
            <div class="container">
                <h1>✏️ Edit Staff</h1>
                <p>Manage kingdom staff and ranks</p>
            </div>
        </section>

        <section class="page-section">
            <div class="container">
                <div class="stats-grid fade-up" style="margin-bottom:3rem;">
                    <div class="stat-card">
                        <div class="stat-number" id="totalStaffCount">0</div>
                        <div class="stat-label">Total Staff</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="ownerCount">0</div>
                        <div class="stat-label">Owners</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="wizardKingCount">0</div>
                        <div class="stat-label">Wizard Kings</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="captainCount">0</div>
                        <div class="stat-label">Captains+</div>
                    </div>
                </div>

                <div class="quick-actions fade-up" style="margin-bottom:3rem;">
                    <h2 style="color:var(--gold);font-family:'Cinzel Decorative',cursive;text-align:center;margin-bottom:1.5rem;">Staff Actions</h2>
                    <div class="actions-grid">
                        <button class="action-btn" onclick="openAddStaffModal()"><span style="font-size:2rem;margin-bottom:0.5rem;">➕</span><br>Add Staff</button>
                        <button class="action-btn" onclick="openRemoveStaffModal()"><span style="font-size:2rem;margin-bottom:0.5rem;">➖</span><br>Remove Staff</button>
                        <button class="action-btn" onclick="openChangeRankModal()"><span style="font-size:2rem;margin-bottom:0.5rem;">🔄</span><br>Change Rank</button>
                    </div>
                </div>

                <div class="fade-up">
                    <h2 style="color:var(--gold);font-family:'Cinzel Decorative',cursive;text-align:center;margin-bottom:1.5rem;">Current Staff</h2>
                    <div id="staffListContainer"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer expanded" id="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-title">Clover Kingdom</div>
                <a href="https://discord.gg/7tUgatHjtg" target="_blank" class="discord-link">Join our Discord</a>
                <div class="footer-credit">Made & Managed by Suki</div>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
