<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Clover Kingdom</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
    <!-- Sidebar -->
    <nav class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
            <h3>Clover Kingdom</h3>
            <div class="sidebar-rank" id="sidebarRank">Rank</div>
        </div>
        <ul class="sidebar-links admin-links" id="adminLinks">
            <!-- Staff links injected by JS based on rank -->
        </ul>
        <div class="sidebar-footer">
            <a href="index.html" class="btn-signin">← Back to Site</a>
            <a href="#" id="logoutBtn" class="btn-signin" style="margin-top:0.5rem;">Sign Out</a>
        </div>
    </nav>

    <!-- Toggle Button -->
    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Dashboard Content -->
    <main class="dashboard-main expanded" id="mainContent">
        <div class="dashboard-container">
            <!-- Welcome Header -->
            <div class="dashboard-header fade-up">
                <div class="welcome-badge">
                    <div class="user-rank" id="userRank">Rank</div>
                    <h1 id="welcomeText">Welcome to the Kingdom</h1>
                    <p id="userName">Magic Knight</p>
                </div>
            </div>

                            <!-- Stats Grid -->
                <div class="stats-grid fade-up">
                    <div class="stat-card">
                        <div class="stat-icon">👑</div>
                        <div class="stat-number" id="dashTotalStaff">0</div>
                        <div class="stat-label">Total Staff</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⚔️</div>
                        <div class="stat-number" id="dashActiveStaff">0</div>
                        <div class="stat-label">Active Staff</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📋</div>
                        <div class="stat-number" id="dashPendingApps">0</div>
                        <div class="stat-label">Pending Applications</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📝</div>
                        <div class="stat-number" id="dashPendingAppeals">0</div>
                        <div class="stat-label">Pending Appeals</div>
                    </div>
                </div>
            <!-- Quick Actions -->
            <div class="quick-actions fade-up">
                <h2>Quick Actions</h2>
                <div class="actions-grid" id="quickActions">
                    <!-- Injected by JS based on rank -->
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="activity-section fade-up">
                <h2>Recent Activity</h2>
                <div class="activity-log" id="activityLog">
                    <div class="activity-item">
                        <div class="activity-time">Just now</div>
                        <div class="activity-text">Dashboard accessed</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
