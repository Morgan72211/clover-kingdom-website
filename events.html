<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Clover Kingdom</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
            <h3>Clover Kingdom</h3>
        </div>
        <ul class="sidebar-links">
            <li><a href="applications.html">Applications</a></li>
            <li><a href="announcements.html">Announcements</a></li>
            <li><a href="events.html" class="active">Events</a></li>
            <li><a href="appeals.html">Appeals</a></li>
            <li><a href="staff.html">Staff</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="login.html" id="auth-link" class="btn-signin">Sign In</a>
        </div>
    </nav>

    <!-- Toggle Button -->
    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Main Content -->
    <main class="main-content expanded" id="mainContent">
        <section class="page-header fade-up">
            <div class="container">
                <h1>📅 Events</h1>
                <p>Join tournaments, quests, and celebrations across the kingdom</p>
            </div>
        </section>

        <section class="page-section">
            <div class="container">
                <div class="cards-grid" id="publicEventsContainer">
                    <!-- Events loaded dynamically -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer expanded" id="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-title">Clover Kingdom</div>
                <a href="https://discord.gg/7tUgatHjtg" target="_blank" class="discord-link">Join our Discord</a>
                <div class="footer-credit">Made & Managed by Suki</div>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        // Load events for public page
        function loadPublicEvents() {
            const container = document.getElementById('publicEventsContainer');
            if (!container) return;
            
            let events = JSON.parse(localStorage.getItem('ck_events') || '[]');
            
            // Add demo events if empty (these will be deletable)
            if (events.length === 0) {
                events = [
                    {
                        name: 'Magic Knight Tournament',
                        date: '2026-06-15',
                        desc: 'Compete against the strongest mages in the kingdom. Grand prize: Royal Grimoire.',
                        type: 'tournament',
                        id: 2001
                    },
                    {
                        name: 'Beast Hunt Quest',
                        date: '2026-06-22',
                        desc: 'Join a squad to track and subdue magical beasts threatening nearby villages.',
                        type: 'quest',
                        id: 2002
                    },
                    {
                        name: 'Kingdom Festival',
                        date: '2026-07-01',
                        desc: 'Celebrate the founding of Clover Kingdom with games, food, and magic displays.',
                        type: 'festival',
                        id: 2003
                    }
                ];
                localStorage.setItem('ck_events', JSON.stringify(events));
            }
            
            if (events.length === 0) {
                container.innerHTML = '<p style="color:var(--text-dark);text-align:center;">No events scheduled yet.</p>';
                return;
            }
            
            let html = '';
            events.forEach(event => {
                html += `
                    <div class="card">
                        <div class="card-icon">📅</div>
                        <h3>${event.name}</h3>
                        <p>${event.desc}</p>
                        <div class="event-date">${event.date}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        loadPublicEvents();
    </script>
</body>
</html>
