<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login | Clover Kingdom</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; overflow: hidden; position: relative; }
    #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .hero { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 2rem; }
    .logo-container { margin-bottom: 2rem; animation: fadeInUp 1s ease-out forwards, float 4s ease-in-out infinite 1.3s; opacity: 0; }
    .logo-container img { width: 100px; height: auto; opacity: 0.9; transition: transform 0.5s, filter 0.5s; }
    .logo-container img:hover { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); }
    .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 6vw, 4rem); font-weight: 900; letter-spacing: 0.15em; margin-bottom: 1rem; text-transform: uppercase; animation: fadeInUp 1s ease-out 0.3s forwards; opacity: 0; }
    .hero-subtitle { font-size: 0.9rem; color: #888; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 3rem; animation: fadeInUp 1s ease-out 0.5s forwards; opacity: 0; }
    .divider { width: 60px; height: 1px; background: #333; margin: 0 auto 3rem; position: relative; animation: fadeInUp 1s ease-out 0.7s forwards; opacity: 0; }
    .divider::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background: #333; border-radius: 50%; transition: all 0.3s; }
    .form-card { background: #111; border: 1px solid #222; padding: 3rem; width: 100%; max-width: 450px; animation: fadeInUp 1s ease-out 0.9s forwards; opacity: 0; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; }
    .form-group input { width: 100%; padding: 1rem; background: #0a0a0a; border: 1px solid #222; color: #fff; font-family: 'Inter', sans-serif; font-size: 1rem; transition: border-color 0.3s; }
    .form-group input:focus { outline: none; border-color: #444; }
    .btn { width: 100%; padding: 1rem; background: transparent; border: 1px solid #333; color: #888; font-family: 'Inter', sans-serif; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; }
    .btn:hover { border-color: #fff; color: #fff; }
    .message { margin-top: 1rem; padding: 1rem; text-align: center; font-size: 0.9rem; display: none; }
    .message.show { display: block; }
    .message.error { color: #ED4245; border: 1px solid rgba(237,66,69,0.3); }
    .back-link { display: block; text-align: center; margin-top: 2rem; color: #555; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s; animation: fadeInUp 1s ease-out 1.1s forwards; opacity: 0; }
    .back-link:hover { color: #fff; }
    @media (max-width: 768px) { .form-card { padding: 2rem; } }
  </style>
<base target="_blank">
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <main class="hero">
    <div class="logo-container">
      <img src="/assets/logo.png" alt="Clover Kingdom Logo">
    </div>
    <h1>Staff Login</h1>
    <p class="hero-subtitle">Magic Knights Headquarters</p>
    <div class="divider"></div>
    <div class="form-card">
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn">Sign In</button>
        <div id="message" class="message"></div>
      </form>
    </div>
    <a href="/index.html" class="back-link">← Return to Home</a>
  </main>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const m = document.getElementById('message');
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const d = await r.json();
        if (r.ok) {
          localStorage.setItem('token', d.token);
          localStorage.setItem('user', JSON.stringify(d.user));
          window.location.href = '/src/dashboard/index.html';
        } else {
          m.textContent = d.error || 'Invalid credentials';
          m.className = 'message show error';
        }
      } catch {
        m.textContent = 'Network error';
        m.className = 'message show error';
      }
    });
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const particles = [];
    for (let i = 0; i < 50; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 0.5,
        speedX: Math.random() * 0.5 - 0.25,
        speedY: Math.random() * 0.5 - 0.25,
        opacity: Math.random() * 0.5 + 0.1
      });
    }
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;
        if (p.x > canvas.width) p.x = 0;
        if (p.x < 0) p.x = canvas.width;
        if (p.y > canvas.height) p.y = 0;
        if (p.y < 0) p.y = canvas.height;
        ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      requestAnimationFrame(animate);
    }
    animate();
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
