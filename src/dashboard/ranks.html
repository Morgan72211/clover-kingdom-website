<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rank Management — Clover Kingdom</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
/* Mobile Responsive */
@media (max-width: 768px) {
  .sidebar {
    width: 240px;
    padding: 1.5rem;
  }

  .main {
    margin-left: 0;
    padding: 1rem;
  }

  .cards {
    grid-template-columns: 1fr;
  }

  .card {
    padding: 1rem;
  }

  .card .value {
    font-size: 2rem;
  }

  .main-header h1 {
    font-size: 1.2rem;
  }

  .tabs {
    flex-wrap: wrap;
  }

  .tab-btn {
    padding: 0.8rem;
    font-size: 0.75rem;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    max-width: 100%;
  }

  .announcement-item,
  .event-item,
  .appeal-item {
    padding: 1rem;
  }

  .home-btn,
  .logout-btn {
    padding: 0.6rem;
    font-size: 0.75rem;
  }
}

@media (max-width: 480px) {
  .sidebar {
    width: 260px;
  }

  .main-header h1 {
    font-size: 1rem;
  }

  .card .value {
    font-size: 1.8rem;
  }
}

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100vh;
      background: #111;
      border-right: 1px solid #222;
      padding: 2rem;
      overflow-y: auto;
    }

    .sidebar-header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #222;
    }

    .sidebar-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
    }

    .sidebar-header small {
      color: #666;
      font-size: 0.75rem;
    }

    .user-info {
      margin-bottom: 2rem;
      padding: 1rem;
      background: #1a1a1a;
      border: 1px solid #222;
    }

    .user-info .rank {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #888;
      margin-bottom: 0.3rem;
    }

    .user-info .name {
      font-size: 1rem;
      font-weight: 600;
    }

    .sidebar-nav a {
      display: block;
      color: #aaa;
      text-decoration: none;
      padding: 0.8rem 0;
      border-bottom: 1px solid #1a1a1a;
      transition: color 0.3s;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .sidebar-nav a:hover, .sidebar-nav a.active {
      color: #fff;
    }

    .home-btn, .logout-btn {
      margin-top: 1rem;
      width: 100%;
      background: transparent;
      border: 1px solid #333;
      color: #888;
      padding: 0.8rem;
      cursor: pointer;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .home-btn:hover {
      border-color: #fff;
      color: #fff;
    }

    .logout-btn:hover {
      border-color: #e94560;
      color: #e94560;
    }

    .main {
      margin-left: 280px;
      padding: 2rem;
    }

    .main-header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #222;
    }

    .main-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #222;
    }

    .tab-btn {
      background: none;
      border: none;
      color: #888;
      padding: 1rem;
      cursor: pointer;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.3s;
      border-bottom: 2px solid transparent;
    }

    .tab-btn:hover, .tab-btn.active {
      color: #fff;
      border-bottom-color: #fff;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      color: #888;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .form-group input, .form-group select {
      width: 100%;
      max-width: 400px;
      background: #111;
      border: 1px solid #222;
      color: #fff;
      padding: 1rem;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.3s;
    }

    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #444;
    }

    .submit-btn {
      background: transparent;
      border: 1px solid #333;
      color: #fff;
      padding: 1rem 2rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .submit-btn:hover {
      border-color: #fff;
      background: rgba(255,255,255,0.05);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success-msg {
      color: #4ade80;
      font-size: 0.9rem;
      margin-top: 1rem;
    }

    .error-msg {
      color: #e94560;
      font-size: 0.9rem;
      margin-top: 1rem;
    }

    .staff-list {
      margin-top: 2rem;
    }

    .staff-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: #111;
      border: 1px solid #222;
      margin-bottom: 0.5rem;
    }

    .staff-item .info {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .staff-item .username {
      font-weight: 600;
    }

    .staff-item .rank {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .staff-item .actions {
      display: flex;
      gap: 0.5rem;
    }

    .action-btn {
      background: transparent;
      border: 1px solid #333;
      color: #888;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
    }

    .action-btn:hover {
      border-color: #fff;
      color: #fff;
    }

    .action-btn.danger:hover {
      border-color: #e94560;
      color: #e94560;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #111;
      border: 1px solid #222;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    .modal h3 {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }

    .modal p {
      color: #aaa;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .modal-btn {
      background: transparent;
      border: 1px solid #333;
      color: #fff;
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .modal-btn:hover {
      border-color: #fff;
    }

    .modal-btn.confirm:hover {
      border-color: #4ade80;
      color: #4ade80;
    }

    .modal-btn.cancel:hover {
      border-color: #e94560;
      color: #e94560;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">Confirm</h3>
      <p id="modalMessage">Are you sure?</p>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="modalCancel()">Cancel</button>
        <button class="modal-btn confirm" onclick="modalConfirm()">Confirm</button>
      </div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Clover Kingdom</h2>
      <small>Staff Portal</small>
    </div>

    <div class="user-info">
      <div class="rank" id="userRank">Loading...</div>
      <div class="name" id="userName">...</div>
    </div>

    <nav class="sidebar-nav">
      <a href="index.html">Dashboard</a>
      <a href="commands.html">Commands</a>
      <a href="events.html">Events</a>
      <a href="appeals.html">Appeals</a>
      <a href="announcements.html">Post Announcement</a>
      <a href="ranks.html" class="active">Rank Management</a>
    </nav>

    <a href="/index.html" class="home-btn">Return to Homepage</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </aside>

  <main class="main">
    <div class="main-header">
      <h1>Rank Management</h1>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('create')">Create Account</button>
      <button class="tab-btn" onclick="showTab('manage')">Manage Staff</button>
    </div>

    <div class="tab-content active" id="createTab">
      <form id="createForm">
        <div class="form-group">
          <label for="newUsername">Username</label>
          <input type="text" id="newUsername" required>
        </div>

        <div class="form-group">
          <label for="newPassword">Password</label>
          <input type="password" id="newPassword" required>
        </div>

        <div class="form-group">
          <label for="newRank">Rank</label>
          <select id="newRank" required>
            <option value="Vice Captain">Vice Captain</option>
            <option value="Captain">Captain</option>
            <option value="Sovereign">Sovereign</option>
            <option value="Wizard King">Wizard King</option>
          </select>
        </div>

        <button type="submit" class="submit-btn" id="createBtn">Create Account</button>
        <p class="success-msg hidden" id="createSuccess"></p>
        <p class="error-msg hidden" id="createError"></p>
      </form>
    </div>

    <div class="tab-content" id="manageTab">
      <div class="staff-list" id="staffList">
        <p style="color: #555;">Loading staff list...</p>
      </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token) {
      window.location.href = '/login.html';
    }

    document.getElementById('userRank').textContent = user.rank || 'Unknown';
    document.getElementById('userName').textContent = user.username || 'Unknown';

    const allowedRanks = ['Wizard King', 'Suki'];
    if (!allowedRanks.includes(user.rank)) {
      window.location.href = 'index.html';
    }

    let modalCallback = null;
    let selectedRank = null;
    let selectedUser = null;

    function showModal(title, message, onConfirm) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalMessage').textContent = message;
      document.getElementById('modalOverlay').classList.add('active');
      modalCallback = onConfirm;
    }

    function modalConfirm() {
      document.getElementById('modalOverlay').classList.remove('active');
      if (modalCallback) modalCallback();
      modalCallback = null;
    }

    function modalCancel() {
      document.getElementById('modalOverlay').classList.remove('active');
      modalCallback = null;
      if (selectedUser && selectedRank) {
        loadStaffList();
      }
    }

    function showTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab + 'Tab').classList.add('active');
      if (tab === 'manage') loadStaffList();
    }

    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('createBtn');
      const success = document.getElementById('createSuccess');
      const error = document.getElementById('createError');
      
      btn.disabled = true;
      success.classList.add('hidden');
      error.classList.add('hidden');

      try {
        const response = await fetch('http://localhost:3000/api/ranks/create', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            username: document.getElementById('newUsername').value,
            password: document.getElementById('newPassword').value,
            rank: document.getElementById('newRank').value
          })
        });

        const data = await response.json();

        if (response.ok) {
          success.textContent = `Created ${data.user.username} as ${data.user.rank}`;
          success.classList.remove('hidden');
          document.getElementById('createForm').reset();
        } else {
          error.textContent = data.error || 'Failed to create account.';
          error.classList.remove('hidden');
        }
      } catch (err) {
        error.textContent = 'Server error.';
        error.classList.remove('hidden');
      } finally {
        btn.disabled = false;
      }
    });

    async function loadStaffList() {
      const container = document.getElementById('staffList');
      container.innerHTML = '<p style="color: #555;">Loading...</p>';

      try {
        const response = await fetch('http://localhost:3000/api/ranks/list', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await response.json();

        if (response.ok && data.staff) {
          container.innerHTML = data.staff.map(s => `
            <div class="staff-item">
              <div class="info">
                <span class="username">${s.username}</span>
                <span class="rank">${s.rank}</span>
              </div>
              <div class="actions">
                <select id="rank-${s.username}" style="background: #111; border: 1px solid #333; color: #fff; padding: 0.5rem;">
                  <option value="Vice Captain" ${s.rank === 'Vice Captain' ? 'selected' : ''}>Vice Captain</option>
                  <option value="Captain" ${s.rank === 'Captain' ? 'selected' : ''}>Captain</option>
                  <option value="Sovereign" ${s.rank === 'Sovereign' ? 'selected' : ''}>Sovereign</option>
                  <option value="Wizard King" ${s.rank === 'Wizard King' ? 'selected' : ''}>Wizard King</option>
                </select>
                <button class="action-btn" onclick="promptRankChange('${s.username}')">Update</button>
                <button class="action-btn danger" onclick="promptDelete('${s.username}')">Delete</button>
              </div>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<p style="color: #555;">No staff found.</p>';
        }
      } catch (err) {
        container.innerHTML = '<p style="color: #e94560;">Failed to load staff.</p>';
      }
    }

    function promptRankChange(username) {
      const newRank = document.getElementById(`rank-${username}`).value;
      selectedUser = username;
      selectedRank = newRank;
      
      showModal(
        'Change Rank',
        `Change ${username}'s rank to ${newRank}?`,
        () => doRankChange(username, newRank)
      );
    }

    async function doRankChange(username, newRank) {
      try {
        const response = await fetch('http://localhost:3000/api/ranks/update', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ username, newRank })
        });

        const data = await response.json();
        
        if (response.ok) {
          showModal('Success', `${username} is now ${newRank}.`, () => {
            loadStaffList();
          });
        } else {
          showModal('Error', data.error || 'Failed to update rank.', () => {
            loadStaffList();
          });
        }
      } catch (err) {
        showModal('Error', 'Server error.', () => {
          loadStaffList();
        });
      }
    }

    function promptDelete(username) {
      showModal(
        'Delete Account',
        `Delete ${username}'s account? This cannot be undone.`,
        () => doDelete(username)
      );
    }

    async function doDelete(username) {
      try {
        const response = await fetch('http://localhost:3000/api/ranks/delete', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ username })
        });

        const data = await response.json();
        
        if (response.ok) {
          showModal('Success', `${username} has been deleted.`, () => {
            loadStaffList();
          });
        } else {
          showModal('Error', data.error || 'Failed to delete.', null);
        }
      } catch (err) {
        showModal('Error', 'Server error.', null);
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    }
  </script>

</body>
</html>
