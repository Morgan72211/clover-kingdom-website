<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appeals | Clover Kingdom</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; overflow-x: hidden; }
    #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
    .sidebar { position: fixed; top: 0; left: -320px; width: 320px; height: 100vh; background: #111; border-right: 1px solid #222; z-index: 1000; transition: left 0.4s cubic-bezier(0.4,0,0.2,1); padding: 2rem; }
    .sidebar.open { left: 0; }
    .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .sidebar-overlay.active { opacity: 1; visibility: visible; }
    .sidebar-header { margin-bottom: 3rem; padding-bottom: 1.5rem; border-bottom: 1px solid #222; }
    .sidebar-header h2 { font-family: 'Cinzel', serif; font-size: 1.5rem; }
    .sidebar-header small { color: #666; font-size: 0.8rem; }
    .sidebar-nav a { display: block; color: #aaa; text-decoration: none; padding: 1rem 0; border-bottom: 1px solid #1a1a1a; transition: all 0.3s; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; position: relative; }
    .sidebar-nav a::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 0; background: #fff; transition: height 0.3s; }
    .sidebar-nav a:hover, .sidebar-nav a.active { color: #fff; padding-left: 15px; }
    .sidebar-nav a:hover::before, .sidebar-nav a.active::before { height: 60%; }
    .menu-btn { position: fixed; top: 2rem; left: 2rem; z-index: 998; background: none; border: none; cursor: pointer; padding: 0.5rem; }
    .menu-btn span { display: block; width: 28px; height: 2px; background: #fff; margin: 6px 0; transition: all 0.3s; }
    .menu-btn.active span:nth-child(1) { transform: rotate(45deg) translate(5px,6px); }
    .menu-btn.active span:nth-child(2) { opacity: 0; }
    .menu-btn.active span:nth-child(3) { transform: rotate(-45deg) translate(6px,-6px); }
    .content { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 8rem 2rem 4rem; }
    .content h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem,5vw,3rem); margin-bottom: 3rem; text-align: center; letter-spacing: 0.1em; animation: fadeInUp 1s ease-out forwards; opacity: 0; }
    .filters { display: flex; gap: 0.5rem; margin-bottom: 2rem; justify-content: center; animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .btn { padding: 0.5rem 1rem; background: transparent; border: 1px solid #333; color: #888; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; }
    .btn:hover, .btn.active { border-color: #fff; color: #fff; }
    table { width: 100%; border-collapse: collapse; background: #111; border: 1px solid #222; animation: fadeInUp 0.8s ease-out forwards; opacity: 0; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #222; }
    th { color: #666; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
    td { color: #aaa; font-size: 0.9rem; }
    .status { display: inline-block; padding: 0.25rem 0.75rem; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; border: 1px solid; }
    .status.pending { color: #FEE75C; border-color: rgba(254,231,92,0.3); }
    .status.approved { color: #57F287; border-color: rgba(87,242,135,0.3); }
    .status.denied { color: #ED4245; border-color: rgba(237,66,69,0.3); }
    .explanation { background: #0a0a0a; padding: 1rem; margin-top: 0.5rem; font-size: 0.85rem; color: #888; }
    .user-badge { position: fixed; top: 2rem; right: 2rem; z-index: 10; display: flex; align-items: center; gap: 1rem; animation: fadeIn 1s ease-out forwards; opacity: 0; }
    .user-badge .rank { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 2px; }
    .user-badge .name { font-size: 0.9rem; }
    .logout-btn { color: #888; text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
    .logout-btn:hover { color: #ED4245; }
    footer { border-top: 1px solid #1a1a1a; padding: 3rem 2rem; text-align: center; position: relative; z-index: 1; }
    .discord-link { display: inline-flex; align-items: center; gap: 0.5rem; color: #888; text-decoration: none; font-size: 0.85rem; transition: all 0.3s; }
    .discord-link:hover { color: #fff; }
    .discord-link svg { width: 20px; height: 20px; fill: currentColor; }
    .footer-copy { margin-top: 1.5rem; font-size: 0.75rem; color: #444; }
    @media (max-width: 768px) { .content { padding: 6rem 1rem 2rem; } }
  </style>
<base target="_blank">
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar">
    <div class="sidebar-header"><h2>Clover Kingdom</h2><small>Staff Panel</small></div>
    <nav class="sidebar-nav">
      <a href="/src/dashboard/index.html">Dashboard</a>
      <a href="/src/dashboard/commands.html">Commands</a>
      <a href="/src/dashboard/events.html">Events</a>
      <a href="/src/dashboard/appeals.html" class="active">Appeals</a>
      <a href="/src/dashboard/ranks.html" id="ranks-link" style="display:none;">Ranks</a>
      <a href="/index.html">← Exit Panel</a>
    </nav>
  </aside>
  <button class="menu-btn" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
  <div class="user-badge">
    <div><div class="rank" id="user-rank">-</div><div class="name" id="user-name">-</div></div>
    <a href="#" class="logout-btn" onclick="logout()">Logout</a>
  </div>
  <div class="content">
    <h1>Appeal Reviews</h1>
    <div class="filters">
      <button class="btn active" onclick="filter('all')">All</button>
      <button class="btn" onclick="filter('Pending')">Pending</button>
      <button class="btn" onclick="filter('Approved')">Approved</button>
      <button class="btn" onclick="filter('Denied')">Denied</button>
    </div>
    <div id="appeals-table"><p style="color:#555;text-align:center;padding:2rem;">Loading...</p></div>
  </div>
  <footer>
    <a href="https://discord.gg/BaCFgcyTrt" class="discord-link" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
      Join our Discord
    </a>
    <p class="footer-copy"> Clover Kingdom. All rights reserved.</p>
  </footer>
  <script>
    const token=localStorage.getItem('token');const user=JSON.parse(localStorage.getItem('user')||'{}');if(!token)window.location.href='/src/dashboard/login.html';
    const ranks={'Vice Captain':1,'Captain':2,'Sovereign':3,'Wizard King':4,'Suki':5};const lvl=ranks[user.rank]||0;
    document.getElementById('user-rank').textContent=user.rank;document.getElementById('user-name').textContent=user.username;
    if(lvl>=4)document.getElementById('ranks-link').style.display='block';
    function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.sidebar-overlay').classList.toggle('active');document.querySelector('.menu-btn').classList.toggle('active');}
    function logout(){localStorage.clear();window.location.href='/index.html';}
    const auth=(url,opts={})=>fetch(url,{...opts,headers:{...opts.headers,'Authorization':`Bearer ${token}`,'Content-Type':'application/json'}});
    let currentFilter='all';
    function filter(status){currentFilter=status;document.querySelectorAll('.filters .btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');loadAppeals();}
    async function loadAppeals(){try{const url=currentFilter==='all'?'/api/appeals':`/api/appeals?status=${currentFilter}`;const r=await auth(url);const d=await r.json();const el=document.getElementById('appeals-table');if(d&&d.length>0){el.innerHTML='<table><thead><tr><th>User</th><th>Type</th><th>Reason</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>'+d.map(a=>`<tr><td>${a.username}<br><small style="color:#555">${a.discordId}</small></td><td>${a.type}</td><td>${a.reason}</td><td><span class="status ${a.status.toLowerCase()}">${a.status}</span></td><td>${new Date(a.createdAt).toLocaleDateString()}</td><td>${a.status==='Pending'?`<button class="btn" onclick="review('${a._id}','Approved')">Approve</button><button class="btn" onclick="review('${a._id}','Denied')">Deny</button>`:`<small style="color:#555">By ${a.reviewedBy||'Unknown'}</small>`}</td></tr><tr><td colspan="6"><div class="explanation"><strong>Explanation:</strong> ${a.explanation}${a.reviewNote?`<br><strong>Note:</strong> ${a.reviewNote}`:''}</div></td></tr>`).join('')+'</tbody></table>';}else{el.innerHTML='<p style="color:#555;text-align:center;padding:2rem;">No appeals found.</p>';}}catch{document.getElementById('appeals-table').innerHTML='<p style="color:#555;text-align:center;padding:2rem;">Failed to load.</p>';}}
    async function review(id,status){const note=prompt('Review note (optional):')||'';try{await auth(`/api/appeals/${id}`,{method:'PUT',body:JSON.stringify({status,reviewNote:note})});loadAppeals();}catch{alert('Error');}}loadAppeals();
    const canvas=document.getElementById('particles-canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<<50;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*2+0.5,speedX:Math.random()*0.5-0.25,speedY:Math.random()*0.5-0.25,opacity:Math.random()*0.5+0.1});function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.speedX;p.y+=p.speedY;if(p.x>canvas.width)p.x=0;if(p.x<<0)p.x=canvas.width;if(p.y>canvas.height)p.y=0;if(p.y<<0)p.y=canvas.height;ctx.fillStyle=`rgba(255,255,255,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
  </script>
</body>
</html>
