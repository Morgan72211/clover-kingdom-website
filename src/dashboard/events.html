<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — Clover Kingdom Staff</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
/* Mobile Responsive */
@media (max-width: 768px) {
  .sidebar {
    width: 240px;
    padding: 1.5rem;
  }

  .main {
    margin-left: 0;
    padding: 1rem;
  }

  .cards {
    grid-template-columns: 1fr;
  }

  .card {
    padding: 1rem;
  }

  .card .value {
    font-size: 2rem;
  }

  .main-header h1 {
    font-size: 1.2rem;
  }

  .tabs {
    flex-wrap: wrap;
  }

  .tab-btn {
    padding: 0.8rem;
    font-size: 0.75rem;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    max-width: 100%;
  }

  .announcement-item,
  .event-item,
  .appeal-item {
    padding: 1rem;
  }

  .home-btn,
  .logout-btn {
    padding: 0.6rem;
    font-size: 0.75rem;
  }
}

@media (max-width: 480px) {
  .sidebar {
    width: 260px;
  }

  .main-header h1 {
    font-size: 1rem;
  }

  .card .value {
    font-size: 1.8rem;
  }
}

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .fade-in {
      animation: fadeIn 0.6s ease-out forwards;
      opacity: 0;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100vh;
      background: #111;
      border-right: 1px solid #222;
      padding: 2rem;
      overflow-y: auto;
    }

    .sidebar-header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #222;
      animation: slideIn 0.5s ease-out forwards;
    }

    .sidebar-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
    }

    .sidebar-header small {
      color: #666;
      font-size: 0.75rem;
    }

    .user-info {
      margin-bottom: 2rem;
      padding: 1rem;
      background: #1a1a1a;
      border: 1px solid #222;
      animation: fadeIn 0.5s ease-out 0.2s forwards;
      opacity: 0;
    }

    .user-info .rank {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #888;
      margin-bottom: 0.3rem;
    }

    .user-info .name {
      font-size: 1rem;
      font-weight: 600;
    }

    .sidebar-nav a {
      display: block;
      color: #aaa;
      text-decoration: none;
      padding: 0.8rem 0;
      border-bottom: 1px solid #1a1a1a;
      transition: all 0.3s;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      position: relative;
    }

    .sidebar-nav a::before {
      content: '';
      position: absolute;
      left: -2rem;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 0;
      background: #fff;
      transition: height 0.3s, box-shadow 0.3s;
    }

    .sidebar-nav a:hover {
      color: #fff;
      padding-left: 10px;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    .sidebar-nav a:hover::before {
      height: 60%;
      box-shadow: 0 0 15px rgba(255,255,255,0.8);
    }

    .sidebar-nav a.active {
      color: #fff;
    }

    .sidebar-nav a.active::before {
      height: 60%;
      box-shadow: 0 0 15px rgba(255,255,255,0.8);
    }

    .home-btn, .logout-btn {
      margin-top: 1rem;
      width: 100%;
      background: transparent;
      border: 1px solid #333;
      color: #888;
      padding: 0.8rem;
      cursor: pointer;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .home-btn:hover {
      border-color: #fff;
      color: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .logout-btn:hover {
      border-color: #e94560;
      color: #e94560;
    }

    .main {
      margin-left: 280px;
      padding: 2rem;
      max-width: 1000px;
    }

    .main-header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #222;
      animation: fadeIn 0.6s ease-out forwards;
    }

    .main-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #222;
      animation: fadeIn 0.6s ease-out 0.2s forwards;
      opacity: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      color: #888;
      padding: 1rem;
      cursor: pointer;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
      border-bottom: 2px solid transparent;
    }

    .tab-btn:hover, .tab-btn.active {
      color: #fff;
      border-bottom-color: #fff;
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.5s ease-out forwards;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1.5rem;
      animation: fadeIn 0.5s ease-out forwards;
      opacity: 0;
    }

    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }

    .form-group label {
      display: block;
      color: #888;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      max-width: 500px;
      background: #111;
      border: 1px solid #222;
      color: #fff;
      padding: 1rem;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #444;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .submit-btn {
      background: transparent;
      border: 1px solid #333;
      color: #fff;
      padding: 1rem 2rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
      animation: fadeIn 0.5s ease-out 0.4s forwards;
      opacity: 0;
    }

    .submit-btn:hover {
      border-color: #fff;
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success-msg {
      color: #4ade80;
      font-size: 0.9rem;
      margin-top: 1rem;
      animation: fadeIn 0.3s ease-out forwards;
    }

    .error-msg {
      color: #e94560;
      font-size: 0.9rem;
      margin-top: 1rem;
      animation: fadeIn 0.3s ease-out forwards;
    }

    .hidden {
      display: none !important;
    }

    /* Events list */
    .events-list {
      margin-top: 2rem;
    }

    .event-item {
      padding: 1.5rem;
      background: #111;
      border: 1px solid #222;
      margin-bottom: 1rem;
      animation: fadeIn 0.5s ease-out forwards;
      opacity: 0;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .event-item:nth-child(1) { animation-delay: 0.1s; }
    .event-item:nth-child(2) { animation-delay: 0.2s; }
    .event-item:nth-child(3) { animation-delay: 0.3s; }
    .event-item:nth-child(4) { animation-delay: 0.4s; }

    .event-item:hover {
      border-color: #333;
      transform: translateX(5px);
      box-shadow: -5px 0 20px rgba(255,255,255,0.05);
    }

    .event-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: #333;
      transition: background 0.3s;
    }

    .event-item:hover::before {
      background: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    .event-status {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      border: 1px solid #333;
      margin-bottom: 0.8rem;
    }

    .event-status.upcoming { border-color: #4ade80; color: #4ade80; }
    .event-status.ongoing { border-color: #fbbf24; color: #fbbf24; animation: pulse 2s infinite; }
    .event-status.completed { border-color: #888; color: #888; }
    .event-status.cancelled { border-color: #e94560; color: #e94560; }

    .event-item h3 {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .event-item p {
      color: #aaa;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .event-meta {
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .event-meta span {
      color: #777;
    }

    .event-actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .action-btn {
      background: transparent;
      border: 1px solid #333;
      color: #888;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
    }

    .action-btn:hover {
      border-color: #fff;
      color: #fff;
    }

    .action-btn.danger:hover {
      border-color: #e94560;
      color: #e94560;
    }

    .status-select {
      background: #111;
      border: 1px solid #333;
      color: #fff;
      padding: 0.5rem;
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 2px solid #222;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 2rem auto;
    }

    .no-events {
      text-align: center;
      color: #555;
      padding: 3rem 0;
      font-style: italic;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #111;
      border: 1px solid #222;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
      animation: fadeIn 0.3s ease-out forwards;
    }

    .modal h3 {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }

    .modal p {
      color: #aaa;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .modal-btn {
      background: transparent;
      border: 1px solid #333;
      color: #fff;
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .modal-btn:hover {
      border-color: #fff;
    }

    .modal-btn.confirm:hover {
      border-color: #4ade80;
      color: #4ade80;
    }

    .modal-btn.cancel:hover {
      border-color: #e94560;
      color: #e94560;
    }
  </style>
</head>
<body>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">Confirm</h3>
      <p id="modalMessage">Are you sure?</p>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="modalCancel()">Cancel</button>
        <button class="modal-btn confirm" onclick="modalConfirm()">Confirm</button>
      </div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Clover Kingdom</h2>
      <small>Staff Portal</small>
    </div>

    <div class="user-info">
      <div class="rank" id="userRank">Loading...</div>
      <div class="name" id="userName">...</div>
    </div>

    <nav class="sidebar-nav">
      <a href="index.html">Dashboard</a>
      <a href="commands.html">Commands</a>
      <a href="events.html" class="active">Events</a>
      <a href="appeals.html">Appeals</a>
      <a href="announcements.html">Announcements</a>
      <a href="ranks.html" id="ranksLink" class="hidden">Rank Management</a>
    </nav>

    <a href="/index.html" class="home-btn">Return to Homepage</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </aside>

  <main class="main">
    <div class="main-header">
      <h1>Events</h1>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('create')">Create Event</button>
      <button class="tab-btn" onclick="showTab('manage')">Manage Events</button>
    </div>

    <div class="tab-content active" id="createTab">
      <form id="eventForm">
        <div class="form-group">
          <label for="title">Event Title</label>
          <input type="text" id="title" required>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" required></textarea>
        </div>

        <div class="form-group">
          <label for="eventDate">Event Date</label>
          <input type="datetime-local" id="eventDate" required>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Create Event</button>
        <p class="success-msg hidden" id="successMsg"></p>
        <p class="error-msg hidden" id="errorMsg"></p>
      </form>
    </div>

    <div class="tab-content" id="manageTab">
      <div class="events-list" id="eventsList">
        <div class="spinner"></div>
      </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token) {
      window.location.href = '/login.html';
    }

    document.getElementById('userRank').textContent = user.rank || 'Unknown';
    document.getElementById('userName').textContent = user.username || 'Unknown';

    const rankHierarchy = {
      'Vice Captain': 1,
      'Captain': 2,
      'Sovereign': 3,
      'Wizard King': 4,
      'Suki': 5
    };

    if (rankHierarchy[user.rank] >= 4) {
      document.getElementById('ranksLink').classList.remove('hidden');
    }

    // Modal
    let modalCallback = null;

    function showModal(title, message, onConfirm) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalMessage').textContent = message;
      document.getElementById('modalOverlay').classList.add('active');
      modalCallback = onConfirm;
    }

    function modalConfirm() {
      document.getElementById('modalOverlay').classList.remove('active');
      if (modalCallback) modalCallback();
      modalCallback = null;
    }

    function modalCancel() {
      document.getElementById('modalOverlay').classList.remove('active');
      modalCallback = null;
    }

    function showTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab + 'Tab').classList.add('active');
      if (tab === 'manage') loadEvents();
    }

    // Create event
    document.getElementById('eventForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('title').value;
      const description = document.getElementById('description').value;
      const eventDate = document.getElementById('eventDate').value;
      const btn = document.getElementById('submitBtn');
      const successMsg = document.getElementById('successMsg');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = 'Creating...';
      successMsg.classList.add('hidden');
      errorMsg.classList.add('hidden');

      try {
        const response = await fetch('http://localhost:3000/api/events/create', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ title, description, eventDate })
        });

        const data = await response.json();

        if (response.ok) {
          successMsg.textContent = 'Event created successfully!';
          successMsg.classList.remove('hidden');
          document.getElementById('eventForm').reset();
        } else {
          errorMsg.textContent = data.error || 'Failed to create event.';
          errorMsg.classList.remove('hidden');
        }

      } catch (error) {
        errorMsg.textContent = 'Unable to connect to server.';
        errorMsg.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Event';
      }
    });

    // Load events
    async function loadEvents() {
      const container = document.getElementById('eventsList');
      container.innerHTML = '<div class="spinner"></div>';

      try {
        const response = await fetch('http://localhost:3000/api/events');
        const data = await response.json();

        if (data.events && data.events.length > 0) {
          container.innerHTML = data.events.map((e, i) => {
            const statusClass = e.status.toLowerCase();
            const dateStr = new Date(e.eventDate).toLocaleDateString('en-US', {
              weekday: 'long',
              year: 'numeric',
              month: 'long',
              day: 'numeric',
              hour: '2-digit',
              minute: '2-digit'
            });

            const canEdit = e.host === user.username || rankHierarchy[user.rank] >= 3;
            const canDelete = e.host === user.username || rankHierarchy[user.rank] >= 2;

            return `
              <div class="event-item" style="animation-delay: ${i * 0.1}s">
                <span class="event-status ${statusClass}">${e.status}</span>
                <h3>${e.title}</h3>
                <p>${e.description}</p>
                <div class="event-meta">
                  <span>${dateStr}</span>
                  <span>Hosted by <span>${e.host}</span> (${e.hostRank})</span>
                </div>
                ${canEdit ? `
                <div class="event-actions">
                  <select id="status-${e._id}" class="status-select">
                    <option value="Upcoming" ${e.status === 'Upcoming' ? 'selected' : ''}>Upcoming</option>
                    <option value="Ongoing" ${e.status === 'Ongoing' ? 'selected' : ''}>Ongoing</option>
                    <option value="Completed" ${e.status === 'Completed' ? 'selected' : ''}>Completed</option>
                    <option value="Cancelled" ${e.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
                  </select>
                  <button class="action-btn" onclick="updateStatus('${e._id}')">Update Status</button>
                  ${canDelete ? `<button class="action-btn danger" onclick="deleteEvent('${e._id}', '${e.title.replace(/'/g, "\\'")}')">Delete</button>` : ''}
                </div>
                ` : ''}
              </div>
            `;
          }).join('');
        } else {
          container.innerHTML = '<p class="no-events">No events scheduled.</p>';
        }
      } catch (error) {
        container.innerHTML = '<p class="no-events">Failed to load events.</p>';
      }
    }

    async function updateStatus(id) {
      const newStatus = document.getElementById(`status-${id}`).value;
      
      showModal('Update Status', `Change event status to ${newStatus}?`, async () => {
        try {
          const response = await fetch(`http://localhost:3000/api/events/edit/${id}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ status: newStatus })
          });

          const data = await response.json();

          if (response.ok) {
            showModal('Success', 'Status updated.', () => loadEvents());
          } else {
            showModal('Error', data.error || 'Failed to update.', null);
          }
        } catch (err) {
          showModal('Error', 'Server error.', null);
        }
      });
    }

    function deleteEvent(id, title) {
      showModal('Delete Event', `Delete "${title}"? This cannot be undone.`, async () => {
        try {
          const response = await fetch(`http://localhost:3000/api/events/delete/${id}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({})
          });

          const data = await response.json();

          if (response.ok) {
            showModal('Success', 'Event deleted.', () => loadEvents());
          } else {
            showModal('Error', data.error || 'Failed to delete.', null);
          }
        } catch (err) {
          showModal('Error', 'Server error.', null);
        }
      });
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    }
  </script>

</body>
</html>
