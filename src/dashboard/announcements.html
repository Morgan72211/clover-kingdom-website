<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — Clover Kingdom</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
/* Mobile Responsive */
@media (max-width: 768px) {
  .sidebar {
    width: 240px;
    padding: 1.5rem;
  }

  .main {
    margin-left: 0;
    padding: 1rem;
  }

  .cards {
    grid-template-columns: 1fr;
  }

  .card {
    padding: 1rem;
  }

  .card .value {
    font-size: 2rem;
  }

  .main-header h1 {
    font-size: 1.2rem;
  }

  .tabs {
    flex-wrap: wrap;
  }

  .tab-btn {
    padding: 0.8rem;
    font-size: 0.75rem;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    max-width: 100%;
  }

  .announcement-item,
  .event-item,
  .appeal-item {
    padding: 1rem;
  }

  .home-btn,
  .logout-btn {
    padding: 0.6rem;
    font-size: 0.75rem;
  }
}

@media (max-width: 480px) {
  .sidebar {
    width: 260px;
  }

  .main-header h1 {
    font-size: 1rem;
  }

  .card .value {
    font-size: 1.8rem;
  }
}

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100vh;
      background: #111;
      border-right: 1px solid #222;
      padding: 2rem;
      overflow-y: auto;
    }

    .sidebar-header {
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #222;
    }

    .sidebar-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
    }

    .sidebar-header small {
      color: #666;
      font-size: 0.75rem;
    }

    .user-info {
      margin-bottom: 2rem;
      padding: 1rem;
      background: #1a1a1a;
      border: 1px solid #222;
    }

    .user-info .rank {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #888;
      margin-bottom: 0.3rem;
    }

    .user-info .name {
      font-size: 1rem;
      font-weight: 600;
    }

    .sidebar-nav a {
      display: block;
      color: #aaa;
      text-decoration: none;
      padding: 0.8rem 0;
      border-bottom: 1px solid #1a1a1a;
      transition: color 0.3s;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .sidebar-nav a:hover, .sidebar-nav a.active {
      color: #fff;
    }

    .home-btn, .logout-btn {
      margin-top: 1rem;
      width: 100%;
      background: transparent;
      border: 1px solid #333;
      color: #888;
      padding: 0.8rem;
      cursor: pointer;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .home-btn:hover {
      border-color: #fff;
      color: #fff;
    }

    .logout-btn:hover {
      border-color: #e94560;
      color: #e94560;
    }

    .main {
      margin-left: 280px;
      padding: 2rem;
      max-width: 900px;
    }

    .main-header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #222;
    }

    .main-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #222;
    }

    .tab-btn {
      background: none;
      border: none;
      color: #888;
      padding: 1rem;
      cursor: pointer;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.3s;
      border-bottom: 2px solid transparent;
    }

    .tab-btn:hover, .tab-btn.active {
      color: #fff;
      border-bottom-color: #fff;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      color: #888;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      color: #fff;
      padding: 1rem;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #444;
    }

    .form-group textarea {
      min-height: 200px;
      resize: vertical;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .checkbox-group input[type="checkbox"] {
      width: auto;
      accent-color: #fff;
    }

    .checkbox-group label {
      color: #aaa;
      font-size: 0.85rem;
      text-transform: none;
      letter-spacing: normal;
    }

    .submit-btn {
      background: transparent;
      border: 1px solid #333;
      color: #fff;
      padding: 1rem 2rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .submit-btn:hover {
      border-color: #fff;
      background: rgba(255,255,255,0.05);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success-msg {
      color: #4ade80;
      font-size: 0.9rem;
      margin-top: 1rem;
    }

    .error-msg {
      color: #e94560;
      font-size: 0.9rem;
      margin-top: 1rem;
    }

    .announcement-list {
      margin-top: 2rem;
    }

    .announcement-item {
      padding: 1.5rem;
      background: #111;
      border: 1px solid #222;
      margin-bottom: 1rem;
    }

    .announcement-item h3 {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .announcement-item p {
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 0.8rem;
      font-size: 0.9rem;
    }

    .announcement-item .meta {
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    .announcement-item .actions {
      display: flex;
      gap: 0.5rem;
    }

    .action-btn {
      background: transparent;
      border: 1px solid #333;
      color: #888;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
    }

    .action-btn:hover {
      border-color: #fff;
      color: #fff;
    }

    .action-btn.danger:hover {
      border-color: #e94560;
      color: #e94560;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #111;
      border: 1px solid #222;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
    }

    .modal h3 {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }

    .modal p {
      color: #aaa;
      margin-bottom: 2rem;
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
    }

    .modal-btn {
      background: transparent;
      border: 1px solid #333;
      color: #fff;
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .modal-btn:hover {
      border-color: #fff;
    }

    .modal-btn.confirm:hover {
      border-color: #4ade80;
      color: #4ade80;
    }

    .modal-btn.cancel:hover {
      border-color: #e94560;
      color: #e94560;
    }

    .edit-modal {
      max-width: 600px;
      width: 90%;
    }

    .edit-modal .form-group {
      margin-bottom: 1.5rem;
    }

    .edit-modal .form-group input,
    .edit-modal .form-group textarea {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #333;
      color: #fff;
      padding: 1rem;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
    }

    .edit-modal .form-group textarea {
      min-height: 150px;
      resize: vertical;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">Confirm</h3>
      <p id="modalMessage">Are you sure?</p>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="modalCancel()">Cancel</button>
        <button class="modal-btn confirm" onclick="modalConfirm()">Confirm</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="editModalOverlay">
    <div class="modal edit-modal">
      <h3>Edit Announcement</h3>
      <div class="form-group">
        <label for="editTitle">Title</label>
        <input type="text" id="editTitle">
      </div>
      <div class="form-group">
        <label for="editContent">Content</label>
        <textarea id="editContent"></textarea>
      </div>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="editModalCancel()">Cancel</button>
        <button class="modal-btn confirm" onclick="editModalConfirm()">Save Changes</button>
      </div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Clover Kingdom</h2>
      <small>Staff Portal</small>
    </div>

    <div class="user-info">
      <div class="rank" id="userRank">Loading...</div>
      <div class="name" id="userName">...</div>
    </div>

    <nav class="sidebar-nav">
      <a href="index.html">Dashboard</a>
      <a href="commands.html">Commands</a>
      <a href="events.html">Events</a>
      <a href="appeals.html">Appeals</a>
      <a href="announcements.html" class="active">Announcements</a>
      <a href="ranks.html" id="ranksLink" class="hidden">Rank Management</a>
    </nav>

    <a href="/index.html" class="home-btn">Return to Homepage</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </aside>

  <main class="main">
    <div class="main-header">
      <h1>Announcements</h1>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('post')">Post New</button>
      <button class="tab-btn" onclick="showTab('manage')">Manage</button>
    </div>

    <div class="tab-content active" id="postTab">
      <form id="announcementForm">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" placeholder="Enter announcement title" required>
        </div>

        <div class="form-group">
          <label for="content">Content</label>
          <textarea id="content" name="content" placeholder="Write your announcement here..." required></textarea>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="sendToDiscord" name="sendToDiscord" checked>
          <label for="sendToDiscord">Send to Discord server</label>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Post Announcement</button>
        <p class="success-msg hidden" id="successMsg"></p>
        <p class="error-msg hidden" id="errorMsg"></p>
      </form>
    </div>

    <div class="tab-content" id="manageTab">
      <div class="announcement-list" id="announcementList">
        <p style="color: #555;">Loading announcements...</p>
      </div>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    if (!token) {
      window.location.href = '/login.html';
    }

    document.getElementById('userRank').textContent = user.rank || 'Unknown';
    document.getElementById('userName').textContent = user.username || 'Unknown';

    const rankHierarchy = {
      'Vice Captain': 1,
      'Captain': 2,
      'Sovereign': 3,
      'Wizard King': 4,
      'Suki': 5
    };

    if (rankHierarchy[user.rank] >= 4) {
      document.getElementById('ranksLink').classList.remove('hidden');
    }

    let modalCallback = null;

    function showModal(title, message, onConfirm) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalMessage').textContent = message;
      document.getElementById('modalOverlay').classList.add('active');
      modalCallback = onConfirm;
    }

    function modalConfirm() {
      document.getElementById('modalOverlay').classList.remove('active');
      if (modalCallback) modalCallback();
      modalCallback = null;
    }

    function modalCancel() {
      document.getElementById('modalOverlay').classList.remove('active');
      modalCallback = null;
    }

    let editId = null;
    let editCallback = null;

    function showEditModal(id, title, content, onSave) {
      editId = id;
      editCallback = onSave;
      document.getElementById('editTitle').value = title;
      document.getElementById('editContent').value = content;
      document.getElementById('editModalOverlay').classList.add('active');
    }

    function editModalConfirm() {
      const title = document.getElementById('editTitle').value;
      const content = document.getElementById('editContent').value;
      document.getElementById('editModalOverlay').classList.remove('active');
      if (editCallback) editCallback(title, content);
      editId = null;
      editCallback = null;
    }

    function editModalCancel() {
      document.getElementById('editModalOverlay').classList.remove('active');
      editId = null;
      editCallback = null;
    }

    function showTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab + 'Tab').classList.add('active');
      if (tab === 'manage') loadAnnouncements();
    }

    document.getElementById('announcementForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;
      const sendToDiscord = document.getElementById('sendToDiscord').checked;
      const btn = document.getElementById('submitBtn');
      const successMsg = document.getElementById('successMsg');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = 'Posting...';
      successMsg.classList.add('hidden');
      errorMsg.classList.add('hidden');

      try {
        const response = await /api/announcements/create', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ title, content, sendToDiscord })
        });

        const data = await response.json();

        if (response.ok) {
          successMsg.textContent = sendToDiscord 
            ? 'Announcement posted and sent to Discord!' 
            : 'Announcement posted successfully!';
          successMsg.classList.remove('hidden');
          document.getElementById('title').value = '';
          document.getElementById('content').value = '';
        } else {
          errorMsg.textContent = data.error || 'Failed to post announcement.';
          errorMsg.classList.remove('hidden');
        }

      } catch (error) {
        errorMsg.textContent = 'Unable to connect to server.';
        errorMsg.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Post Announcement';
      }
    });

    async function loadAnnouncements() {
      const container = document.getElementById('announcementList');
      container.innerHTML = '<p style="color: #555;">Loading...</p>';

      try {
        const response = await /api/announcements');
        const data = await response.json();

        if (data.announcements && data.announcements.length > 0) {
          container.innerHTML = data.announcements.map(a => `
            <div class="announcement-item" id="announce-${a._id}">
              <h3>${a.title}</h3>
              <p id="content-${a._id}">${a.content}</p>
              <div class="meta">Posted by ${a.author} (${a.authorRank}) — ${new Date(a.createdAt).toLocaleDateString()}</div>
              <div class="actions">
                <button class="action-btn" onclick="openEdit('${a._id}', '${a.title.replace(/'/g, "\\'")}', '${a.content.replace(/'/g, "\\'")}')">Edit</button>
                <button class="action-btn danger" onclick="deleteAnnouncement('${a._id}', '${a.title.replace(/'/g, "\\'")}')">Delete</button>
              </div>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<p style="color: #555;">No announcements yet.</p>';
        }
      } catch (error) {
        container.innerHTML = '<p style="color: #e94560;">Failed to load announcements.</p>';
      }
    }

    function openEdit(id, title, content) {
      showEditModal(id, title, content, async (newTitle, newContent) => {
        showModal('Confirm Edit', 'Update this announcement?', async () => {
          try {
            const response = await fetch(`http://localhost:3000/api/announcements/edit/${id}`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
              },
              body: JSON.stringify({ title: newTitle, content: newContent })
            });

            const data = await response.json();

            if (response.ok) {
              showModal('Success', 'Announcement updated.', () => loadAnnouncements());
            } else {
              showModal('Error', data.error || 'Failed to update.', null);
            }
          } catch (err) {
            showModal('Error', 'Server error.', null);
          }
        });
      });
    }

    function deleteAnnouncement(id, title) {
      showModal('Delete Announcement', `Delete "${title}"? This cannot be undone.`, async () => {
        try {
          const response = await fetch(`http://localhost:3000/api/announcements/delete/${id}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({})
          });

          const data = await response.json();

          if (response.ok) {
            showModal('Success', 'Announcement deleted.', () => loadAnnouncements());
          } else {
            showModal('Error', data.error || 'Failed to delete.', null);
          }
        } catch (err) {
          showModal('Error', 'Server error.', null);
        }
      });
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    }
  </script>

</body>
</html>
