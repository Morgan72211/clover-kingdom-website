<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Clover Kingdom</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
            <h3>Clover Kingdom</h3>
        </div>
        <ul class="sidebar-links">
            <li><a href="applications.html">Applications</a></li>
            <li><a href="announcements.html">Announcements</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="appeals.html">Appeals</a></li>
            <li><a href="staff.html">Staff</a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="login.html" class="btn-signin">Sign In</a>
        </div>
    </nav>

    <!-- Toggle Button -->
    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Main Content -->
    <main class="main-content expanded" id="mainContent">
        <section class="page-header fade-up">
            <div class="container">
                <h1>🔐 Sign In</h1>
                <p>Enter your credentials to access the kingdom</p>
            </div>
        </section>

        <section class="page-section">
            <div class="container">
                <div class="form-container fade-up">
                    <form class="login-form" id="loginForm">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        </div>
                        <div class="error-message" id="errorMessage"></div>
                        <button type="submit" class="btn-submit">Enter the Kingdom</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer expanded" id="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-title">Clover Kingdom</div>
                <a href="https://discord.gg/7tUgatHjtg" target="_blank" class="discord-link">Join our Discord</a>
                <div class="footer-credit">Made & Managed by Suki</div>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
