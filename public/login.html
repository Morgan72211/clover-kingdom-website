<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login — Clover Kingdom</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }

    .login-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .login-header h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: #666;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      color: #888;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      color: #fff;
      padding: 1rem;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #444;
    }

    .form-group input::placeholder {
      color: #444;
    }

    .login-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #333;
      color: #fff;
      padding: 1rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
      margin-top: 1rem;
    }

    .login-btn:hover {
      border-color: #fff;
      background: rgba(255,255,255,0.05);
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      color: #e94560;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 1rem;
      min-height: 1.2rem;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: #555;
      text-decoration: none;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #888;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #333;
      margin: 2rem auto;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <h1>Staff Portal</h1>
      <p>Authorized Personnel Only</p>
      <div class="divider"></div>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
      <p class="error-msg" id="errorMsg"></p>
    </form>

    <a href="index.html" class="back-link"> Return to Public Site</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = 'Authenticating...';
      errorMsg.textContent = '';

      try {
        const response = await fetch('http://localhost:3000/api/auth', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Save token and redirect to dashboard
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/src/dashboard/index.html';
        } else {
          errorMsg.textContent = data.error || 'Login failed.';
        }

      } catch (error) {
        errorMsg.textContent = 'Unable to connect to server.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>

</body>
</html>
