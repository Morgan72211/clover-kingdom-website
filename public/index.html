<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clover Kingdom</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #ffffff; min-height: 100vh; overflow-x: hidden; }
    #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .sidebar { position: fixed; top: 0; left: -320px; width: 320px; height: 100vh; background: #111; border-right: 1px solid #222; z-index: 1000; transition: left 0.4s cubic-bezier(0.4,0,0.2,1); padding: 2rem; }
    .sidebar.open { left: 0; }
    .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .sidebar-overlay.active { opacity: 1; visibility: visible; }
    .sidebar-header { margin-bottom: 3rem; padding-bottom: 1.5rem; border-bottom: 1px solid #222; }
    .sidebar-header h2 { font-family: 'Cinzel', serif; font-size: 1.5rem; }
    .sidebar-header small { color: #666; font-size: 0.8rem; }
    .sidebar-nav a { display: block; color: #aaa; text-decoration: none; padding: 1rem 0; border-bottom: 1px solid #1a1a1a; transition: all 0.3s; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; position: relative; }
    .sidebar-nav a::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 0; background: #fff; transition: height 0.3s; }
    .sidebar-nav a:hover, .sidebar-nav a.active { color: #fff; padding-left: 15px; }
    .sidebar-nav a:hover::before, .sidebar-nav a.active::before { height: 60%; }
    .menu-btn { position: fixed; top: 2rem; left: 2rem; z-index: 998; background: none; border: none; cursor: pointer; padding: 0.5rem; }
    .menu-btn span { display: block; width: 28px; height: 2px; background: #fff; margin: 6px 0; transition: all 0.3s; }
    .menu-btn.active span:nth-child(1) { transform: rotate(45deg) translate(5px,6px); }
    .menu-btn.active span:nth-child(2) { opacity: 0; }
    .menu-btn.active span:nth-child(3) { transform: rotate(-45deg) translate(6px,-6px); }
    .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem; position: relative; z-index: 1; }
    .hero::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 200px; background: linear-gradient(to top, #0a0a0a, transparent); z-index: -1; }
    .logo-container { margin-bottom: 2rem; animation: fadeInUp 1s ease-out forwards, float 4s ease-in-out infinite 1.3s; opacity: 0; }
    .logo-container img { width: 180px; height: auto; opacity: 0.9; transition: transform 0.5s, filter 0.5s; }
    .logo-container img:hover { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(255,255,255,0.3)); }
    .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900; letter-spacing: 0.15em; margin-bottom: 1rem; text-transform: uppercase; animation: fadeInUp 1s ease-out 0.3s forwards; opacity: 0; }
    .hero-subtitle { font-size: 1rem; color: #888; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 4rem; animation: fadeInUp 1s ease-out 0.5s forwards; opacity: 0; }
    .divider { width: 60px; height: 1px; background: #333; margin: 2rem auto; position: relative; animation: fadeInUp 1s ease-out 0.7s forwards; opacity: 0; }
    .divider::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; background: #333; border-radius: 50%; transition: all 0.3s; }
    .divider:hover::after { background: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.5); }
    .announcements-section { max-width: 800px; margin: 0 auto; padding: 4rem 2rem; position: relative; z-index: 1; }
    .section-label { font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.4em; text-transform: uppercase; color: #666; margin-bottom: 3rem; text-align: center; animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .spinner { width: 40px; height: 40px; border: 2px solid #222; border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 2rem auto; }
    .announcement-item { padding: 2rem 0; border-bottom: 1px solid #1a1a1a; animation: slideIn 0.6s ease-out forwards; opacity: 0; transition: all 0.3s; position: relative; }
    .announcement-item:nth-child(1) { animation-delay: 0.1s; }
    .announcement-item:nth-child(2) { animation-delay: 0.2s; }
    .announcement-item:nth-child(3) { animation-delay: 0.3s; }
    .announcement-item:nth-child(4) { animation-delay: 0.4s; }
    .announcement-item:nth-child(5) { animation-delay: 0.5s; }
    .announcement-item:hover { padding-left: 10px; border-left: 2px solid #fff; }
    .announcement-item h3 { font-family: 'Cinzel', serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 0.8rem; color: #fff; transition: text-shadow 0.3s; }
    .announcement-item:hover h3 { text-shadow: 0 0 10px rgba(255,255,255,0.3); }
    .announcement-item p { color: #aaa; line-height: 1.8; font-size: 0.95rem; margin-bottom: 1rem; }
    .announcement-meta { font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 0.1em; }
    .announcement-meta span { color: #777; }
    .no-announcements { text-align: center; color: #555; padding: 4rem 0; font-style: italic; animation: fadeIn 0.8s ease-out forwards; }
    .staff-login { position: fixed; bottom: 2rem; right: 2rem; background: transparent; border: 1px solid #333; color: #888; padding: 0.8rem 1.5rem; text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; transition: all 0.3s; z-index: 100; animation: fadeIn 1s ease-out 1s forwards; opacity: 0; }
    .staff-login:hover { border-color: #fff; color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); transform: translateY(-2px); }
    footer { border-top: 1px solid #1a1a1a; padding: 3rem 2rem; text-align: center; position: relative; z-index: 1; animation: fadeIn 0.8s ease-out forwards; opacity: 0; }
    .discord-link { display: inline-flex; align-items: center; gap: 0.5rem; color: #888; text-decoration: none; font-size: 0.85rem; transition: all 0.3s; }
    .discord-link:hover { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
    .discord-link svg { width: 20px; height: 20px; fill: currentColor; transition: transform 0.3s; }
    .discord-link:hover svg { transform: scale(1.2); }
    .footer-copy { margin-top: 1.5rem; font-size: 0.75rem; color: #444; }
    @media (max-width: 768px) { .hero h1 { font-size: 2rem; } .hero-subtitle { font-size: 0.8rem; } .announcements-section { padding: 2rem 1rem; } .announcement-item { padding: 1.5rem 0; } .announcement-item h3 { font-size: 1.1rem; } .staff-login { bottom: 1rem; right: 1rem; padding: 0.6rem 1rem; font-size: 0.7rem; } footer { padding: 2rem 1rem; } }
    @media (max-width: 480px) { .menu-btn { top: 1rem; left: 1rem; } .hero { padding: 1rem; } .hero h1 { font-size: 1.5rem; letter-spacing: 0.1em; } .logo-container img { width: 120px; } .sidebar { width: 280px; padding: 1.5rem; } }
  </style>
<base target="_blank">
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar">
    <div class="sidebar-header"><h2>Clover Kingdom</h2><small>Official Portal</small></div>
    <nav class="sidebar-nav">
      <a href="/index.html" class="active">Home</a>
      <a href="/announcements.html">Announcements</a>
      <a href="/news.html">News</a>
      <a href="/events.html">Events</a>
      <a href="/appeals.html">Appeals</a>
      <a href="/src/dashboard/login.html" id="staff-nav-link" style="display:none;">Staff Panel</a>
    </nav>
  </aside>
  <button class="menu-btn" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
  <section class="hero">
    <div class="logo-container">
      <img src="/assets/logo.png" alt="Black Clover Logo">
    </div>
    <h1>Clover Kingdom</h1>
    <p class="hero-subtitle">Magic Knights Headquarters</p>
    <div class="divider"></div>
  </section>
  <section class="announcements-section">
    <p class="section-label">Kingdom News</p>
    <div id="announcements-list"><div class="spinner"></div></div>
  </section>
  <a href="/src/dashboard/login.html" class="staff-login">Staff Login</a>
  <footer>
    <a href="https://discord.gg/BaCFgcyTrt" class="discord-link">
      <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
      Join our Discord
    </a>
    <p class="footer-copy"> Clover Kingdom. All rights reserved.</p>
  </footer>
  <script>
    const canvas=document.getElementById('particles-canvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const particles=[];for(let i=0;i<50;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*2+0.5,speedX:Math.random()*0.5-0.25,speedY:Math.random()*0.5-0.25,opacity:Math.random()*0.5+0.1});function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.speedX;p.y+=p.speedY;if(p.x>canvas.width)p.x=0;if(p.x<0)p.x=canvas.width;if(p.y>canvas.height)p.y=0;if(p.y<0)p.y=canvas.height;ctx.fillStyle=`rgba(255,255,255,${p.opacity})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});requestAnimationFrame(animate);}animate();window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
    function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.sidebar-overlay').classList.toggle('active');document.querySelector('.menu-btn').classList.toggle('active');}
    if(localStorage.getItem('token'))document.getElementById('staff-nav-link').style.display='block';
    async function loadAnnouncements(){try{const response=await fetch('/api/announcements');const data=await response.json();const container=document.getElementById('announcements-list');if(data&&data.length>0){container.innerHTML=data.slice(0,5).map((a,i)=>`<div class="announcement-item" style="animation-delay:${i*0.1}s"><h3>${escapeHtml(a.title)}</h3><p>${escapeHtml(a.content)}</p><div class="announcement-meta">Posted by <span>${escapeHtml(a.author)}</span> — ${escapeHtml(a.authorRank)} — ${new Date(a.createdAt).toLocaleDateString()}</div></div>`).join('');}else{container.innerHTML='<p class="no-announcements">No news at this time.</p>';}}catch{document.getElementById('announcements-list').innerHTML='<p class="no-announcements">No news at this time.</p>';}}
    function escapeHtml(text){const div=document.createElement('div');div.textContent=text;return div.innerHTML;}
    loadAnnouncements();
  </script>
</body>
</html>
