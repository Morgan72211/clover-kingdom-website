<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Appeal — Clover Kingdom</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
/* Mobile Responsive */
@media (max-width: 768px) {
  .page-header h1 {
    font-size: 2rem;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 0.8rem;
  }

  .submit-btn {
    width: 100%;
  }

  .staff-login {
    bottom: 1rem;
    right: 1rem;
    padding: 0.6rem 1rem;
    font-size: 0.7rem;
  }

  footer {
    padding: 2rem 1rem;
  }
}

@media (max-width: 480px) {
  .menu-btn {
    top: 1rem;
    left: 1rem;
  }

  .page-header h1 {
    font-size: 1.5rem;
  }

  .sidebar {
    width: 280px;
    padding: 1.5rem;
  }
}

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .fade-in {
      animation: fadeIn 0.8s ease-out forwards;
      opacity: 0;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -320px;
      width: 320px;
      height: 100vh;
      background: #111111;
      border-right: 1px solid #222;
      z-index: 1000;
      transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 2rem;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .sidebar-header {
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #222;
      animation: slideIn 0.5s ease-out forwards;
    }

    .sidebar-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      color: #fff;
    }

    .sidebar-header small {
      color: #666;
      font-size: 0.8rem;
    }

    .sidebar-nav a {
      display: block;
      color: #aaa;
      text-decoration: none;
      padding: 1rem 0;
      border-bottom: 1px solid #1a1a1a;
      transition: all 0.3s;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      animation: slideIn 0.5s ease-out forwards;
      opacity: 0;
    }

    .sidebar-nav a:nth-child(1) { animation-delay: 0.1s; }
    .sidebar-nav a:nth-child(2) { animation-delay: 0.15s; }
    .sidebar-nav a:nth-child(3) { animation-delay: 0.2s; }
    .sidebar-nav a:nth-child(4) { animation-delay: 0.25s; }

    .sidebar-nav a::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 0;
      background: #fff;
      transition: height 0.3s, box-shadow 0.3s;
    }

    .sidebar-nav a:hover {
      color: #fff;
      padding-left: 15px;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    .sidebar-nav a:hover::before {
      height: 60%;
      box-shadow: 0 0 15px rgba(255,255,255,0.8);
    }

    .sidebar-nav a.active {
      color: #fff;
    }

    .menu-btn {
      position: fixed;
      top: 2rem;
      left: 2rem;
      z-index: 998;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
      animation: fadeIn 0.5s ease-out forwards;
    }

    .menu-btn span {
      display: block;
      width: 28px;
      height: 2px;
      background: #fff;
      margin: 6px 0;
      transition: all 0.3s;
    }

    .menu-btn.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 6px);
    }

    .menu-btn.active span:nth-child(2) {
      opacity: 0;
    }

    .menu-btn.active span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }

    .main {
      margin-left: 0;
      padding: 2rem;
      max-width: 700px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .page-header {
      text-align: center;
      padding: 4rem 0 2rem;
      animation: fadeInUp 1s ease-out forwards;
      opacity: 0;
    }

    .page-header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .page-header p {
      color: #888;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #333;
      margin: 2rem auto;
      position: relative;
    }

    .divider::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background: #333;
      border-radius: 50%;
      transition: all 0.3s;
    }

    .divider:hover::after {
      background: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    .form-group {
      margin-bottom: 1.5rem;
      animation: fadeIn 0.5s ease-out forwards;
      opacity: 0;
    }

    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.15s; }
    .form-group:nth-child(3) { animation-delay: 0.2s; }
    .form-group:nth-child(4) { animation-delay: 0.25s; }
    .form-group:nth-child(5) { animation-delay: 0.3s; }
    .form-group:nth-child(6) { animation-delay: 0.35s; }

    .form-group label {
      display: block;
      color: #888;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      color: #fff;
      padding: 1rem;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #444;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .submit-btn {
      background: transparent;
      border: 1px solid #333;
      color: #fff;
      padding: 1rem 2rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
      animation: fadeIn 0.5s ease-out 0.4s forwards;
      opacity: 0;
    }

    .submit-btn:hover {
      border-color: #fff;
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 15px rgba(255,255,255,0.1);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .success-msg {
      color: #4ade80;
      font-size: 0.9rem;
      margin-top: 1rem;
      animation: fadeIn 0.3s ease-out forwards;
    }

    .error-msg {
      color: #e94560;
      font-size: 0.9rem;
      margin-top: 1rem;
      animation: fadeIn 0.3s ease-out forwards;
    }

    .hidden {
      display: none !important;
    }

    .staff-login {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: transparent;
      border: 1px solid #333;
      color: #888;
      padding: 0.8rem 1.5rem;
      text-decoration: none;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: all 0.3s;
      z-index: 100;
      animation: fadeIn 1s ease-out 1s forwards;
      opacity: 0;
    }

    .staff-login:hover {
      border-color: #fff;
      color: #fff;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    footer {
      border-top: 1px solid #1a1a1a;
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      z-index: 1;
      margin-top: 4rem;
      animation: fadeIn 0.8s ease-out forwards;
      opacity: 0;
    }

    .discord-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #888;
      text-decoration: none;
      font-size: 0.85rem;
      transition: all 0.3s;
    }

    .discord-link:hover {
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .discord-link svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      transition: transform 0.3s;
    }

    .discord-link:hover svg {
      transform: scale(1.2);
    }

    .footer-copy {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #444;
    }

    .page-transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s;
    }

    .page-transition.active {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>
<body>

  <canvas id="particles-canvas"></canvas>
  <div class="page-transition" id="pageTransition"></div>

  <button class="menu-btn" onclick="toggleSidebar()">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Clover Kingdom</h2>
      <small>Official Portal</small>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" onclick="pageTransition(event, 'index.html')">Home</a>
      <a href="announcements.html" onclick="pageTransition(event, 'announcements.html')">Announcements</a>
      <a href="events.html" onclick="pageTransition(event, 'events.html')">Events</a>
      <a href="appeals.html" class="active" onclick="pageTransition(event, 'appeals.html')">Appeals</a>
    </nav>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1>Submit Appeal</h1>
      <p>Request a Review of Your Case</p>
      <div class="divider"></div>
    </div>

    <form id="appealForm">
      <div class="form-group">
        <label for="type">Punishment Type</label>
        <select id="type" required>
          <option value="">Select type...</option>
          <option value="Ban">Ban</option>
          <option value="Warn">Warn</option>
          <option value="Mute">Mute</option>
        </select>
      </div>

      <div class="form-group">
        <label for="username">Your Username</label>
        <input type="text" id="username" placeholder="Roblox/Discord username" required>
      </div>

      <div class="form-group">
        <label for="discordTag">Discord Tag</label>
        <input type="text" id="discordTag" placeholder="username#1234 or @username" required>
      </div>

      <div class="form-group">
        <label for="reason">Why do you think this was wrong?</label>
        <textarea id="reason" placeholder="Explain why you believe the punishment was incorrect..." required></textarea>
      </div>

      <div class="form-group">
        <label for="explanation">Your Side of the Story</label>
        <textarea id="explanation" placeholder="Tell us what happened from your perspective..." required></textarea>
      </div>

      <div class="form-group">
        <label for="evidence">Evidence (Optional)</label>
        <input type="text" id="evidence" placeholder="Links to screenshots, videos, etc.">
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Submit Appeal</button>
      <p class="success-msg hidden" id="successMsg"></p>
      <p class="error-msg hidden" id="errorMsg"></p>
    </form>
  </main>

  <a href="login.html" class="staff-login" onclick="pageTransition(event, 'login.html')">Staff Login</a>

  <footer>
    <a href="https://discord.gg/BaCFgcyTrt" class="discord-link" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
      Join our Discord
    </a>
    <p class="footer-copy"> Clover Kingdom. All rights reserved.</p>
  </footer>

  <script>
    // Particles
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 50;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = Math.random() * 0.5 - 0.25;
        this.speedY = Math.random() * 0.5 - 0.25;
        this.opacity = Math.random() * 0.5 + 0.1;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x > canvas.width) this.x = 0;
        if (this.x < 0) this.x = canvas.width;
        if (this.y > canvas.height) this.y = 0;
        if (this.y < 0) this.y = canvas.height;
      }

      draw() {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < particleCount; i++) particles.push(new Particle());

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }

    animateParticles();
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Sidebar
    function toggleSidebar() {
      document.querySelector('.sidebar').classList.toggle('open');
      document.querySelector('.sidebar-overlay').classList.toggle('active');
      document.querySelector('.menu-btn').classList.toggle('active');
    }

    // Page transition
    function pageTransition(e, url) {
      e.preventDefault();
      document.getElementById('pageTransition').classList.add('active');
      setTimeout(() => window.location.href = url, 300);
    }

    // Submit appeal
    document.getElementById('appealForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('submitBtn');
      const successMsg = document.getElementById('successMsg');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = 'Submitting...';
      successMsg.classList.add('hidden');
      errorMsg.classList.add('hidden');

      try {
        const response = await fetch('/api/appeals', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            type: document.getElementById('type').value,
            username: document.getElementById('username').value,
            discordTag: document.getElementById('discordTag').value,
            reason: document.getElementById('reason').value,
            explanation: document.getElementById('explanation').value,
            evidence: document.getElementById('evidence').value
          })
        });

        const data = await response.json();

        if (response.ok) {
          successMsg.textContent = 'Appeal submitted successfully! Staff will review it soon.';
          successMsg.classList.remove('hidden');
          document.getElementById('appealForm').reset();
        } else {
          errorMsg.textContent = data.error || 'Failed to submit appeal.';
          errorMsg.classList.remove('hidden');
        }

      } catch (error) {
        errorMsg.textContent = 'Unable to connect to server.';
        errorMsg.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit Appeal';
      }
    });
  </script>

</body>
</html>
