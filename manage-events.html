<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events - Clover Kingdom</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
            <h3>Clover Kingdom</h3>
            <div class="sidebar-rank" id="sidebarRank">Rank</div>
        </div>
        <ul class="sidebar-links admin-links" id="adminLinks"></ul>
        <div class="sidebar-footer">
            <a href="dashboard.html" class="btn-signin">← Dashboard</a>
            <a href="#" id="logoutBtn" class="btn-signin" style="margin-top:0.5rem;">Sign Out</a>
        </div>
    </nav>

    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <main class="main-content expanded" id="mainContent">
        <section class="page-header fade-up">
            <div class="container">
                <h1>📅 Manage Events</h1>
                <p>Create and manage kingdom events</p>
            </div>
        </section>

        <section class="page-section">
            <div class="container">
                <div class="form-container fade-up">
                    <form class="appeal-form" id="eventForm">
                        <div class="form-group">
                            <label>Event Name</label>
                            <input type="text" id="eventName" placeholder="Magic Knight Tournament" required>
                        </div>
                        <div class="form-group">
                            <label>Event Date</label>
                            <input type="date" id="eventDate" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="eventDesc" rows="4" placeholder="Describe the event..." required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Event Type</label>
                            <select id="eventType">
                                <option value="tournament">Tournament</option>
                                <option value="quest">Quest</option>
                                <option value="festival">Festival</option>
                                <option value="exam">Exam</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-submit">Create Event</button>
                    </form>

                    <div class="events-list" id="eventsList" style="margin-top:3rem;">
                        <h2 style="color:var(--gold);font-family:'Cinzel Decorative',cursive;margin-bottom:1.5rem;">Current Events</h2>
                        <div id="eventsContainer"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer expanded" id="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-title">Clover Kingdom</div>
                <a href="https://discord.gg/7tUgatHjtg" target="_blank" class="discord-link">Join our Discord</a>
                <div class="footer-credit">Made & Managed by Suki</div>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
